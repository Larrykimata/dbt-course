models:
  - name: dim_listings_cleansed
    config:
      contract:
        enforced: true  
    columns:
     - name: listing_id
       data_tests:
         - unique
         - not_null

     - name: host_id
       data_tests:
         - not_null
         - relationships:
             arguments:
               to: ref('dim_hosts_cleansed')
               field: host_id

     - name: room_type
       data_tests:
         - accepted_values:
             arguments:
               values: ['Entire home/apt', 'Private room', 'Shared room','Hotel room']

     - name: minimum_nights
       data_tests:
         - positive_values

  - name: dim_hosts_cleansed
    columns:

     - name: host_id
       data_tests:
         - unique
         - not_null

     - name: host_name
       data_tests:
         - not_null

     - name: is_superhost
       data_tests:
         - accepted_values:
             arguments:
               values: ['t', 'f']
